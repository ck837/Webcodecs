<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>陀螺仪 WebSocket 客户端 Demo</title>
  <style>
    body { margin: 0; background: #0d1117; color: #c9d1d9; font: 14px/1.5 system-ui, sans-serif; padding: 24px; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    .bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    input { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; width: 280px; }
    button { background: #238636; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    button.off { background: #da3633; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 640px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .card label { font-size: 11px; color: #8b949e; text-transform: uppercase; }
    .card .val { font-size: 28px; font-weight: 600; font-variant-numeric: tabular-nums; color: #58a6ff; }
    .card .unit { font-size: 14px; color: #8b949e; }
    #fps { color: #3fb950; margin-top: 12px; }
    #log { margin-top: 16px; font-family: Consolas, monospace; font-size: 11px; color: #8b949e; max-height: 120px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>无人机陀螺仪 WebSocket 客户端</h1>
  <div class="bar">
    <input id="url" value="ws://127.0.0.1:8765">
    <button id="btn">连接</button>
    <span id="status">未连接</span>
  </div>
  <div class="grid">
    <div class="card"><label>Pitch 俯仰</label><div><span class="val" id="pitch">—</span><span class="unit"> °</span></div></div>
    <div class="card"><label>Roll 横滚</label><div><span class="val" id="roll">—</span><span class="unit"> °</span></div></div>
    <div class="card"><label>Yaw 偏航</label><div><span class="val" id="yaw">—</span><span class="unit"> °</span></div></div>
  </div>
  <div id="fps">FPS: —</div>
  <div id="log"></div>

  <script>
    const urlInput = document.getElementById('url');
    const btn = document.getElementById('btn');
    const statusEl = document.getElementById('status');
    const fpsEl = document.getElementById('fps');
    const logEl = document.getElementById('log');

    let ws = null;
    let frameCount = 0;
    let lastFpsTs = performance.now();

    function log(msg) {
      logEl.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n` + logEl.textContent.slice(0, 2000);
    }

    /** 解析 16 字节二进制帧 */
    function parseGyroFrame(buffer) {
      const view = new DataView(buffer);
      return {
        pitch: view.getFloat32(0, true),
        roll: view.getFloat32(4, true),
        yaw: view.getFloat32(8, true),
        timestamp: view.getUint32(12, true),
      };
    }

    function connect() {
      if (ws) { ws.close(); ws = null; }

      ws = new WebSocket(urlInput.value);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        statusEl.textContent = '已连接';
        btn.textContent = '断开';
        btn.classList.add('off');
        log('WebSocket 已连接');
        frameCount = 0;
        lastFpsTs = performance.now();
      };

      ws.onmessage = (ev) => {
        if (!(ev.data instanceof ArrayBuffer) || ev.data.byteLength < 16) return;
        const { pitch, roll, yaw } = parseGyroFrame(ev.data);

        document.getElementById('pitch').textContent = pitch.toFixed(2);
        document.getElementById('roll').textContent = roll.toFixed(2);
        document.getElementById('yaw').textContent = yaw.toFixed(2);

        frameCount++;
        const now = performance.now();
        if (now - lastFpsTs >= 1000) {
          fpsEl.textContent = `FPS: ${frameCount}  (服务端 ~60fps 广播)`;
          frameCount = 0;
          lastFpsTs = now;
        }
      };

      ws.onclose = () => {
        statusEl.textContent = '未连接';
        btn.textContent = '连接';
        btn.classList.remove('off');
        ws = null;
        log('WebSocket 已断开');
      };

      ws.onerror = () => log('连接错误');
    }

    btn.onclick = () => ws ? ws.close() : connect();
  </script>
</body>
</html>
