<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>未来导航 · 第一人称视角</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{overflow:hidden;width:100%;height:100%;background:#08090c;font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}
#c{display:block;width:100%;height:100%;touch-action:none;pointer-events:none}
#hud{position:fixed;inset:0;pointer-events:none;color:#fff;transition:color .35s}
body.day #hud{color:#0f172a}

/* 导航信息面板 — 半透明底 + 描边，保证压过 3D 画面仍可读 */
.hud-panel{
  background:rgba(6,10,18,.78);
  border:1px solid rgba(255,255,255,.14);
  border-radius:14px;
  box-shadow:0 8px 32px rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
body.day .hud-panel{
  background:rgba(255,255,255,.92);
  border-color:rgba(15,23,42,.12);
  box-shadow:0 8px 28px rgba(15,23,42,.12);
}

#hud .top{
  position:absolute;top:14px;max-width:520px;
  padding:16px 18px;
}
body.hud-left #hud .top{left:14px;right:auto}
body.hud-right #hud .top{right:14px;left:auto}
#hud .top h1{
  font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:#7dd3fc;
  text-shadow:0 1px 6px rgba(0,0,0,.85);
}
body.day #hud .top h1{color:#0369a1;text-shadow:none}
#hud .top .dest{
  font-size:26px;font-weight:800;margin-top:6px;line-height:1.25;
  color:#fff;
  text-shadow:0 2px 10px rgba(0,0,0,.9),0 0 24px rgba(0,0,0,.35);
}
body.day #hud .top .dest{color:#020617;text-shadow:none}
#hud .top .meta{
  margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;
}
#hud .top .meta span{
  font-size:13px;font-weight:600;
  color:#f1f5f9;
  padding:5px 10px;border-radius:999px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.16);
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
body.day #hud .top .meta span{
  color:#0f172a;
  background:rgba(15,23,42,.06);
  border-color:rgba(15,23,42,.1);
  text-shadow:none;
}

#hud .side{
  position:absolute;top:50%;
  transform:translateY(-50%);
  text-align:center;width:min(168px,28vw);
  padding:16px 14px;
  transition:opacity .3s,transform .3s,visibility .3s;
}
body.hud-left #hud .side{left:14px;right:auto}
body.hud-right #hud .side{right:14px;left:auto}
body.hud-left #hud .side.hidden-panel{
  opacity:0;visibility:hidden;transform:translateY(-50%) translateX(-14px);
  pointer-events:none;
}
body.hud-right #hud .side.hidden-panel{
  opacity:0;visibility:hidden;transform:translateY(-50%) translateX(14px);
  pointer-events:none;
}
#hud .side .label{
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:#7dd3fc;margin-bottom:10px;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
body.day #hud .side .label{color:#0369a1;text-shadow:none}
#hud .arrow{
  width:80px;height:80px;margin:0 auto;
  border-radius:50%;
  border:3px solid #38bdf8;
  background:rgba(8,20,40,.82);
  display:grid;place-items:center;
  font-size:40px;font-weight:700;color:#7dd3fc;
  box-shadow:0 0 0 4px rgba(56,189,248,.25),0 8px 28px rgba(0,0,0,.5);
  transition:opacity .35s,transform .35s;
  text-shadow:0 0 16px rgba(125,211,252,.6);
}
body.day #hud .arrow{
  background:rgba(255,255,255,.95);
  border-color:#0284c7;color:#0369a1;
  box-shadow:0 4px 20px rgba(3,105,161,.2);
  text-shadow:none;
}
#hud .arrow.hidden{opacity:0;transform:scale(.85);pointer-events:none}
#hud .turn{
  font-size:16px;font-weight:700;color:#fff;margin-top:12px;min-height:1.4em;line-height:1.45;
  text-shadow:0 2px 8px rgba(0,0,0,.9);
}
body.day #hud .turn{color:#0c4a6e;text-shadow:none}

#hud .bottom{
  position:absolute;bottom:14px;max-width:min(520px,calc(100vw - 28px));
  padding:16px 18px 18px;
}
body.hud-left #hud .bottom{left:14px;right:auto}
body.hud-right #hud .bottom{right:14px;left:auto}
#hud .street{
  font-size:22px;font-weight:800;color:#fff;line-height:1.3;
  text-shadow:0 2px 10px rgba(0,0,0,.9);
}
body.day #hud .street{color:#020617;text-shadow:none}
#hud .hint{font-size:12px;color:#cbd5e1;margin-top:8px;font-weight:500}
body.day #hud .hint{color:#64748b}
#hud .progress{
  height:6px;background:rgba(255,255,255,.18);border-radius:999px;
  margin-top:14px;overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.25);
}
body.day #hud .progress{background:rgba(15,23,42,.1)}
#hud .progress>i{
  display:block;height:100%;width:0;border-radius:999px;
  background:linear-gradient(90deg,#0ea5e9,#22d3ee);
  box-shadow:0 0 12px rgba(34,211,238,.75);
  transition:width .15s;
}

/* 终点信标罗盘 — 游戏式相对方位 + 剩余米数 */
#destBeaconHud{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  z-index:99;pointer-events:none;text-align:center;
  padding:10px 16px 12px;min-width:108px;
}
#destBeaconHud.arrived .beacon-compass{opacity:.45}
#destBeaconHud .beacon-compass{
  position:relative;width:76px;height:76px;margin:0 auto 6px;
  border-radius:50%;
  border:2px solid rgba(56,189,248,.65);
  background:radial-gradient(circle at 50% 45%,rgba(8,20,40,.9),rgba(4,10,24,.95));
  box-shadow:0 0 0 3px rgba(56,189,248,.18),0 0 24px rgba(34,211,238,.35);
}
body.day #destBeaconHud .beacon-compass{
  background:radial-gradient(circle at 50% 45%,#fff,#f0f9ff);
  border-color:#0284c7;
  box-shadow:0 0 0 3px rgba(2,132,199,.15),0 4px 16px rgba(3,105,161,.2);
}
#destBeaconHud .beacon-n{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:800;color:#7dd3fc;letter-spacing:.08em;
}
body.day #destBeaconHud .beacon-n{color:#0369a1}
#destBeaconHud .beacon-pointer{
  position:absolute;left:50%;top:50%;width:0;height:0;
  margin:-22px 0 0 -9px;
  border-left:9px solid transparent;border-right:9px solid transparent;
  border-bottom:22px solid #22d3ee;
  filter:drop-shadow(0 0 6px rgba(34,211,238,.9));
  transform-origin:9px 22px;
  transition:transform .12s ease-out;
}
body.day #destBeaconHud .beacon-pointer{border-bottom-color:#0284c7;filter:none}
#destBeaconHud .beacon-dist{
  font-size:20px;font-weight:800;color:#fff;line-height:1;
  text-shadow:0 2px 8px rgba(0,0,0,.85);
}
body.day #destBeaconHud .beacon-dist{color:#020617;text-shadow:none}
#destBeaconHud .beacon-cap{
  font-size:10px;font-weight:700;color:#94a3b8;margin-top:4px;letter-spacing:.06em;
}
body.day #destBeaconHud .beacon-cap{color:#64748b}

#ctrl{
  position:fixed;left:50%;bottom:118px;transform:translateX(-50%);
  display:flex;gap:10px;pointer-events:auto;z-index:100;
  flex-wrap:wrap;justify-content:center;max-width:96vw;
  padding:8px 12px;border-radius:999px;
  background:rgba(6,10,18,.72);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 8px 28px rgba(0,0,0,.4);
  backdrop-filter:blur(8px);
}
body.day #ctrl{
  background:rgba(255,255,255,.88);
  border-color:rgba(15,23,42,.1);
  box-shadow:0 6px 20px rgba(15,23,42,.1);
}
#ctrl button{
  padding:10px 18px;border:1px solid rgba(125,211,252,.45);border-radius:999px;
  background:rgba(14,116,178,.35);color:#f0f9ff;
  font-size:13px;font-weight:600;cursor:pointer;
  text-shadow:0 1px 3px rgba(0,0,0,.5);
}
body.day #ctrl button{
  background:rgba(255,255,255,.9);border-color:rgba(3,105,161,.35);color:#0c4a6e;text-shadow:none;
}
#ctrl button.primary{
  border-color:#22d3ee;background:rgba(14,165,233,.55);color:#fff;
}
body.day #ctrl button.primary{background:#0284c7;border-color:#0284c7;color:#fff}

#badge{
  position:fixed;top:14px;z-index:101;
  padding:8px 14px;border-radius:999px;
  font-size:12px;font-weight:800;letter-spacing:.04em;
  background:rgba(22,163,74,.85);color:#fff;
  border:1px solid rgba(255,255,255,.25);
  box-shadow:0 4px 16px rgba(0,0,0,.35);
  text-shadow:0 1px 2px rgba(0,0,0,.3);
  pointer-events:none;
}
#badge.idle{background:rgba(51,65,85,.82);color:#f1f5f9;border-color:rgba(255,255,255,.15)}
body.day #badge.idle{background:rgba(241,245,249,.95);color:#475569;border-color:rgba(15,23,42,.12);text-shadow:none}
body.day #badge{background:rgba(22,163,74,.92);color:#fff}
body.hud-left #badge{right:14px;left:auto}
body.hud-right #badge{left:14px;right:auto}

#btnSettingsToggle{
  position:fixed;bottom:14px;right:14px;z-index:102;
  padding:10px 16px;border-radius:999px;cursor:pointer;pointer-events:auto;
  border:1px solid rgba(125,211,252,.45);
  background:rgba(6,10,18,.82);color:#f0f9ff;
  font-size:13px;font-weight:700;
  box-shadow:0 6px 20px rgba(0,0,0,.35);
  backdrop-filter:blur(8px);
}
body.day #btnSettingsToggle{background:rgba(255,255,255,.9);color:#0c4a6e;border-color:rgba(3,105,161,.35)}
body.hud-right #btnSettingsToggle{right:14px;left:auto}
body.hud-left #btnSettingsToggle{right:14px}

#settings{
  position:fixed;top:0;right:0;z-index:150;
  width:min(320px,92vw);height:100%;
  pointer-events:auto;
  background:rgba(8,12,20,.94);
  border-left:1px solid rgba(255,255,255,.12);
  box-shadow:-12px 0 40px rgba(0,0,0,.45);
  backdrop-filter:blur(12px);
  transform:translateX(100%);
  transition:transform .28s ease;
  display:flex;flex-direction:column;
  color:#e2e8f0;font-size:13px;
}
body.day #settings{background:rgba(248,250,252,.96);color:#0f172a;border-left-color:rgba(15,23,42,.1)}
#settings.open{transform:translateX(0)}
#settings header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1);
}
body.day #settings header{border-bottom-color:rgba(15,23,42,.08)}
#settings header h2{font-size:15px;font-weight:800;color:#7dd3fc}
body.day #settings header h2{color:#0369a1}
#settings header button{
  width:32px;height:32px;border:none;border-radius:8px;cursor:pointer;
  background:rgba(255,255,255,.08);color:inherit;font-size:18px;line-height:1;
}
body.day #settings header button{background:rgba(15,23,42,.06)}
#settings .body{flex:1;overflow-y:auto;padding:12px 16px 24px}
#settings .group{margin-bottom:18px}
#settings .group h3{
  font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:#64748b;margin-bottom:10px;
}
body.day #settings .group h3{color:#64748b}
#settings label.row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin-bottom:10px;min-height:28px;
}
#settings label.row span{flex:1;font-weight:500}
#settings input[type=range]{width:120px;accent-color:#0ea5e9}
#settings input[type=number]{width:64px;padding:4px 6px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.25);color:inherit}
body.day #settings input[type=number]{background:#fff;border-color:rgba(15,23,42,.15)}
#settings select{
  padding:5px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.15);
  background:rgba(0,0,0,.25);color:inherit;font-size:12px;
}
body.day #settings select{background:#fff;border-color:rgba(15,23,42,.15)}
#settings .val{min-width:36px;text-align:right;font-variant-numeric:tabular-nums;font-size:12px;color:#94a3b8}
body.day #settings .val{color:#64748b}
#settings .debug-out{
  margin-top:8px;padding:10px;border-radius:8px;
  background:rgba(0,0,0,.35);font:11px/1.5 ui-monospace,Consolas,monospace;
  color:#94a3b8;white-space:pre-wrap;word-break:break-all;
}
body.day #settings .debug-out{background:rgba(15,23,42,.05);color:#475569}
#settings .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
#settings .actions button{
  padding:7px 12px;border-radius:8px;border:1px solid rgba(125,211,252,.35);
  background:rgba(14,116,178,.3);color:#f0f9ff;font-size:12px;font-weight:600;cursor:pointer;
}
body.day #settings .actions button{background:rgba(14,165,233,.12);color:#0369a1;border-color:rgba(3,105,161,.25)}
#fps{
  position:fixed;top:52px;right:14px;z-index:101;pointer-events:none;
  padding:4px 8px;border-radius:6px;font:11px ui-monospace,Consolas,monospace;
  background:rgba(0,0,0,.55);color:#4ade80;display:none;
}
body.hud-right #fps{right:auto;left:14px}

#err{position:fixed;inset:0;display:none;place-items:center;padding:24px;text-align:center;color:#f87171;background:rgba(0,0,0,.88);font-size:14px;z-index:200}

#vignette{
  position:fixed;inset:0;pointer-events:none;z-index:50;
  background:radial-gradient(ellipse at 50% 55%,transparent 42%,rgba(0,0,0,.55) 100%);
  opacity:0;transition:opacity 1.2s ease;
}
body.cine-active #vignette{opacity:1}
body.cine-night #vignette{background:radial-gradient(ellipse at 50% 50%,transparent 35%,rgba(0,0,0,.72) 100%)}

#cineOverlay{
  position:fixed;inset:0;z-index:120;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transition:opacity 1.4s ease;
}
#cineOverlay.show{opacity:1}
#cineOverlay .tag{
  font-size:12px;font-weight:800;letter-spacing:.28em;text-transform:uppercase;
  color:#67e8f9;text-shadow:0 0 24px rgba(103,232,249,.8);
  margin-bottom:14px;
}
#cineOverlay .title{
  font-size:clamp(28px,6vw,52px);font-weight:900;text-align:center;line-height:1.15;
  color:#fff;text-shadow:0 0 40px rgba(0,229,255,.45),0 4px 24px rgba(0,0,0,.8);
  max-width:90vw;
}
#cineOverlay .sub{
  margin-top:16px;font-size:14px;font-weight:600;color:rgba(226,232,240,.75);
  letter-spacing:.06em;
}

#hud.cine-dim{opacity:.22;transition:opacity 1s ease}
#hud.cine-hide{opacity:0!important;transition:opacity 1.6s ease}
#ctrl.cine-hide,#destBeaconHud.cine-hide,#badge.cine-hide{opacity:0!important;pointer-events:none!important;transition:opacity 1s ease}
#ctrl,#destBeaconHud,#badge{transition:opacity .8s ease}

body.cine-night{background:#050508}
body.cine-night #hud{color:#fff}
body.cine-night .hud-panel{
  background:rgba(4,8,18,.72);
  border-color:rgba(103,232,249,.18);
  box-shadow:0 8px 40px rgba(0,0,0,.55),0 0 0 1px rgba(0,229,255,.06);
}
</style>
</head>
<body class="day hud-left">
<canvas id="c"></canvas>
<div id="hud">
  <div class="top hud-panel">
    <h1 id="cityName">—</h1>
    <div class="dest" id="destName">—</div>
    <div class="meta">
      <span id="distLeft">剩余 —</span>
      <span id="eta">预计 —</span>
      <span id="speed">— km/h</span>
    </div>
  </div>
  <div class="side hud-panel hidden-panel" id="turnPanel">
    <div class="label">即将转向</div>
    <div class="arrow hidden" id="arrow">↑</div>
    <div class="turn" id="turnHint"></div>
  </div>
  <div class="bottom hud-panel">
    <div class="street" id="streetName">准备就绪</div>
    <div class="hint">电影化导航 · 全息隧道 · 极光走廊 · 3DGS 终点显现</div>
    <div class="progress"><i id="routeBar"></i></div>
  </div>
</div>
<div id="destBeaconHud" class="hud-panel">
  <div class="beacon-compass">
    <span class="beacon-n">N</span>
    <div class="beacon-pointer" id="beaconPointer"></div>
  </div>
  <div class="beacon-dist" id="beaconDist">— m</div>
  <div class="beacon-cap">终点信标</div>
</div>
<div id="ctrl">
  <button type="button" class="primary" id="btnStart">开始导航</button>
  <button type="button" id="btnPause">暂停</button>
  <button type="button" id="btnReset">重置</button>
</div>
<button type="button" id="btnSettingsToggle" aria-expanded="false">⚙ 设置</button>
<aside id="settings" aria-hidden="true">
  <header>
    <h2>调试设置</h2>
    <button type="button" id="btnSettingsClose" title="关闭">×</button>
  </header>
  <div class="body">
    <div class="group">
      <h3>显示</h3>
      <label class="row"><span>HUD 位置</span>
        <select id="setHudSide"><option value="left">偏左</option><option value="right">偏右</option></select>
      </label>
      <label class="row"><span>时间</span>
        <select id="setTime"><option value="day">白天</option><option value="night">黑夜</option></select>
      </label>
      <label class="row"><span>箭头间距 (m)</span><input type="range" id="setArrowSpace" min="1.5" max="5" step="0.25" value="2.5"><span class="val" id="valArrowSpace">2.5</span></label>
      <label class="row"><span>显示路线箭头</span><input type="checkbox" id="setRouteLine" checked></label>
      <label class="row"><span>碰撞盒线框</span><input type="checkbox" id="setColliders"></label>
      <label class="row"><span>FPS 计数</span><input type="checkbox" id="setFps"></label>
    </div>
    <div class="group">
      <h3>相机 / 移动</h3>
      <label class="row"><span>步行速度</span><input type="range" id="setSpeed" min="1" max="12" step="0.2" value="5.8"><span class="val" id="valSpeed">5.8</span></label>
      <label class="row"><span>眼高 (m)</span><input type="range" id="setEyeH" min="1.4" max="2.2" step="0.02" value="1.62"><span class="val" id="valEyeH">1.62</span></label>
      <label class="row"><span>视野 FOV</span><input type="range" id="setFov" min="50" max="95" step="1" value="66"><span class="val" id="valFov">66</span></label>
      <label class="row"><span>头部晃动</span><input type="range" id="setBob" min="0" max="0.08" step="0.005" value="0.02"><span class="val" id="valBob">0.02</span></label>
      <label class="row"><span>转向提示 (m)</span><input type="range" id="setTurnDist" min="8" max="60" step="1" value="22"><span class="val" id="valTurnDist">22</span></label>
    </div>
    <div class="group">
      <h3>画面</h3>
      <label class="row"><span>曝光</span><input type="range" id="setExposure" min="0.5" max="2" step="0.05" value="1.15"><span class="val" id="valExposure">1.15</span></label>
      <label class="row"><span>雾近端</span><input type="range" id="setFogNear" min="20" max="120" step="1" value="80"><span class="val" id="valFogNear">80</span></label>
      <label class="row"><span>雾远端</span><input type="range" id="setFogFar" min="80" max="300" step="1" value="200"><span class="val" id="valFogFar">200</span></label>
    </div>
    <div class="group">
      <h3>路线调试</h3>
      <label class="row"><span>进度 scrub</span><input type="range" id="setRouteT" min="0" max="1000" step="1" value="0"><span class="val" id="valRouteT">0%</span></label>
      <div class="actions">
        <button type="button" id="setJumpStart">跳到起点</button>
        <button type="button" id="setJumpEnd">跳到终点</button>
      </div>
      <pre class="debug-out" id="debugOut">—</pre>
    </div>
  </div>
</aside>
<div id="vignette"></div>
<div id="cineOverlay">
  <div class="tag" id="cineTag">端侧高斯重建 · 就绪</div>
  <div class="title" id="cineTitle">北广场 · 未来中心</div>
  <div class="sub" id="cineSub">实景扫描置信度 98.7%</div>
</div>
<div id="fps"></div>
<div id="badge" class="idle">待机</div>
<div id="err"></div>

<script type="module">
import * as THREE from 'three';
import { buildBezierSegments, createCorridorMesh, updateCorridorUniforms } from './nav-shaders.js';
import { SplatOverlay } from './splat-overlay.js';

function rng(seed) {
  let s = seed | 0;
  return () => { s = (s * 1664525 + 1013904223) | 0; return (s >>> 0) / 4294967296; };
}

function span() { return CFG.grid * CFG.cell + (CFG.grid + 1) * CFG.road; }
function origin() { return -span() / 2 + CFG.road / 2; }
function roadX(vi) { return origin() + vi * (CFG.cell + CFG.road) - CFG.road / 2; }
function roadZ(hi) { return origin() + hi * (CFG.cell + CFG.road) - CFG.road / 2; }
function pitch() { return CFG.cell + CFG.road; }

function blockRect(c, r) {
  return {
    x0: roadX(c) + CFG.road / 2,
    x1: roadX(c + 1) - CFG.road / 2,
    z0: roadZ(r) + CFG.road / 2,
    z1: roadZ(r + 1) - CFG.road / 2,
  };
}

function insideBuilding(x, z, pad = 0.12) {
  for (let i = 0; i < buildingColliders.length; i++) {
    const b = buildingColliders[i];
    if (x >= b.x0 - pad && x <= b.x1 + pad && z >= b.z0 - pad && z <= b.z1 + pad) return true;
  }
  return false;
}

function makeTex(w, h, draw) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

/** 轻量折线路径：每段道路中心直线，遇障碍物才绕行 */
function legEndpoints(leg) {
  return {
    ax: roadX(leg.from[0]), az: roadZ(leg.from[1]),
    bx: roadX(leg.to[0]), bz: roadZ(leg.to[1]),
  };
}

function dedupeRoutePoints(pts) {
  const out = [];
  for (const p of pts) {
    const last = out[out.length - 1];
    if (!last) { out.push({ x: p.x, z: p.z }); continue; }
    const d = Math.hypot(p.x - last.x, p.z - last.z);
    if (d > 0.06) out.push({ x: p.x, z: p.z });
  }
  return out;
}

function planLeg(ax, az, bx, bz) {
  const dx = bx - ax, dz = bz - az;
  const len = Math.hypot(dx, dz);
  if (len < 0.05) return [{ x: ax, z: az }];
  const ux = dx / len, uz = dz / len;
  const px = -uz, pz = ux;
  const margin = 0.48;

  const blockers = streetObstacles
    .map((o) => {
      const t = (o.x - ax) * ux + (o.z - az) * uz;
      const cx = ax + ux * t, cz = az + uz * t;
      return { o, t, cx, cz, dist: Math.hypot(o.x - cx, o.z - cz) };
    })
    .filter((b) => b.t > 0.2 && b.t < len - 0.2 && b.dist < b.o.radius + margin)
    .sort((a, b) => a.t - b.t);

  if (!blockers.length) return [{ x: ax, z: az }, { x: bx, z: bz }];

  const pts = [{ x: ax, z: az }];
  let cursor = 0;
  for (const b of blockers) {
    const tEnter = Math.max(cursor + 0.05, b.t - b.o.radius - 0.85);
    const tExit = Math.min(len - 0.05, b.t + b.o.radius + 0.85);
    const side = Math.sign(px * (b.o.x - b.cx) + pz * (b.o.z - b.cz)) || 1;
    const off = b.o.radius + margin + 0.35;
    if (tEnter > cursor + 0.05) pts.push({ x: ax + ux * tEnter, z: az + uz * tEnter });
    pts.push({ x: b.cx + px * side * off, z: b.cz + pz * side * off });
    pts.push({ x: ax + ux * tExit, z: az + uz * tExit });
    cursor = tExit;
  }
  pts.push({ x: bx, z: bz });
  return dedupeRoutePoints(pts);
}

function buildRoute() {
  routePoints = [];
  routeMeta = [{ t: 0, street: CFG.legs[0].street, hint: CFG.legs[0].hint }];

  CFG.legs.forEach((leg, li) => {
    const { ax, az, bx, bz } = legEndpoints(leg);
    const sx = li === 0 ? ax : routePoints[routePoints.length - 1].x;
    const sz = li === 0 ? az : routePoints[routePoints.length - 1].z;
    const legPts = planLeg(sx, sz, bx, bz);
    for (let i = 0; i < legPts.length; i++) {
      if (i === 0 && routePoints.length) continue;
      routePoints.push(legPts[i]);
    }

    if (leg.turn) {
      routeMeta.push({
        t: 0, street: leg.street, hint: leg.hint, turn: leg.turn,
        pointIdx: routePoints.length - 1,
      });
    } else if (li > 0) {
      routeMeta.push({ t: 0, street: leg.street, hint: leg.hint, pointIdx: routePoints.length - 1 });
    }
  });

  routeSegLen = [];
  routeLen = 0;
  for (let i = 1; i < routePoints.length; i++) {
    const a = routePoints[i - 1], b = routePoints[i];
    const d = Math.hypot(b.x - a.x, b.z - a.z);
    routeSegLen.push(d);
    routeLen += d;
  }
  if (routeLen < 1) routeLen = 1;

  for (let i = 1; i < routeMeta.length; i++) {
    const idx = routeMeta[i].pointIdx ?? 0;
    let dist = 0;
    for (let j = 0; j < idx && j < routeSegLen.length; j++) dist += routeSegLen[j];
    routeMeta[i].t = Math.min(0.99, dist / routeLen);
  }
}

function obstaclePosition(leg, t, spec) {
  const { ax, az, bx, bz } = legEndpoints(leg);
  const dx = bx - ax, dz = bz - az;
  const len = Math.hypot(dx, dz) || 1;
  const ux = dx / len, uz = dz / len;
  const px = -uz, pz = ux;
  const cx = ax + ux * len * t;
  const cz = az + uz * len * t;
  const side = spec.side ?? (rand() > 0.5 ? 1 : -1);
  if (spec.block) {
    return { x: cx + px * side * 0.1, z: cz + pz * side * 0.1, rot: Math.atan2(dx, dz) };
  }
  const off = CFG.road * 0.5 + CFG.sidewalk * 0.38;
  return { x: cx + px * side * off, z: cz + pz * side * off, rot: Math.atan2(dx, dz) + Math.PI / 2 };
}

function buildStreetObstacles() {
  streetObstacles = [];
  if (obstacleGroup) {
    obstacleGroup.traverse((c) => {
      if (c.geometry) c.geometry.dispose();
      if (c.material) c.material.dispose();
    });
  }
  obstacleGroup = new THREE.Group();
  const factories = { bike: createBikeMesh, hydrant: createHydrantMesh, flowerbed: createFlowerBedMesh };

  OBSTACLE_LAYOUT.forEach((spec, i) => {
    const leg = CFG.legs[spec.leg];
    if (!leg) return;
    const pos = obstaclePosition(leg, spec.t, spec);
    if (insideBuilding(pos.x, pos.z, 0.4)) return;
    const radius = OBS_RADIUS[spec.type] || 0.5;
    const meshFactory = factories[spec.type];
    const mesh = meshFactory();
    mesh.position.set(pos.x, 0, pos.z);
    mesh.rotation.y = pos.rot + (spec.type === 'bike' ? (rand() - 0.5) * 0.6 : 0);
    obstacleGroup.add(mesh);
    streetObstacles.push({
      id: i, type: spec.type, x: pos.x, z: pos.z, radius, block: spec.block, mesh,
    });
  });
  return obstacleGroup;
}

function createTrafficLight(x, z, faceY) {
  const g = new THREE.Group();

    new THREE.CylinderGeometry(0.06, 0.08, 3.2, 8),
    new THREE.MeshBasicMaterial({ color: 0x374151 })

  );
  housing.position.y = 3.15;
  g.add(housing);

  const colors = [0xef4444, 0xfacc15, 0x22c55e];
  const lamps = [];
  for (let i = 0; i < 3; i++) {
    const lamp = new THREE.Mesh(
      new THREE.CircleGeometry(0.08, 12),
      new THREE.MeshBasicMaterial({ color: colors[i] })
    );
    lamp.position.set(0, 3.38 - i * 0.22, 0.1);
    g.add(lamp);
    lamps.push(lamp);
  }
  g.position.set(x, 0, z);

  trafficLights.push({ lamps, phase: Math.floor(rand() * 3) });
  return g;
}

function buildUrbanFeatures() {
  trafficLights = [];
  const g = new THREE.Group();
  URBAN_NODES.forEach((node) => {
    const { x, z } = intersectionXZ(node.vi, node.hi);
    if (node.lights) {
      const off = CFG.road / 2 + 0.55;
      g.add(createTrafficLight(x + off, z + off, Math.PI * 0.25));
      g.add(createTrafficLight(x - off, z - off, Math.PI * 1.25));
    }
  });
  return g;
}

function updateTrafficLights(time) {
  const cycle = 5;
  trafficLights.forEach((tl, i) => {
    const phase = Math.floor((time + i * 1.7) / cycle) % 3;
    tl.lamps[0].visible = phase === 2;
    tl.lamps[1].visible = phase === 1;
    tl.lamps[2].visible = phase === 0;
  });
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function buildHoloTunnel() {
  const g = new THREE.Group();
  g.visible = false;
  const z = roadZ(3);
  const x0 = roadX(4) + 1.5, x1 = roadX(6) - 1.5;
  const panels = [];
  const cols = ['#00e5ff', '#ff00aa', '#a855f7', '#22d3ee', '#f97316'];

  for (let i = 0; i <= 10; i++) {
    const t = i / 10;
    const x = x0 + t * (x1 - x0);
    for (const side of [-1, 1]) {
      const col = cols[i % cols.length];
      const mat = new THREE.MeshBasicMaterial({
        color: col, transparent: true, opacity: 0.7,
        side: THREE.DoubleSide, depthWrite: false,
      });
      const panel = new THREE.Mesh(new THREE.PlaneGeometry(2.6, 4.2), mat);
      panel.position.set(x, 2.35, z + side * (CFG.road / 2 + 0.15));
      panel.rotation.y = side > 0 ? -Math.PI / 2 : Math.PI / 2;
      panels.push(mat);

      const tex = makeTex(256, 64, (ctx, w, h) => {
        ctx.fillStyle = 'rgba(0,0,0,0)';
        ctx.fillRect(0, 0, w, h);
        ctx.font = 'bold 22px system-ui,sans-serif';
        ctx.fillStyle = col;
        ctx.fillText('HOLO·AD', 12, 38);
        ctx.font = '14px system-ui,sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillText('端侧渲染 · 实时合成', 12, 58);
      });
      const sign = new THREE.Mesh(
        new THREE.PlaneGeometry(2.2, 0.55),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false })
      );
      sign.position.copy(panel.position);
      sign.position.y = 3.1;
      sign.rotation.copy(panel.rotation);
      g.add(sign, panel);

      const top = new THREE.Mesh(
        new THREE.PlaneGeometry(5.8, 1.4),
        new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.35, side: THREE.DoubleSide, depthWrite: false })
      );
      top.position.set(x, 4.5, z);
      top.rotation.x = -Math.PI / 2;
      g.add(top);
    }
  }
  g.userData.panels = panels;
  return g;
}

      );
      prop.position.set(dx, 0.08, 0);
      pack.add(prop);
    }
  }
  g.userData.drones = drones;
  g.userData.baseX = xBase;
  g.userData.baseZ = z;
  return g;
}

function getRouteSliceFromT(fromT) {
  const startDist = fromT * routeLen;
  let walked = 0;
  const pts = [];
  for (let i = 0; i < routePoints.length; i++) {
    if (walked >= startDist - 0.01 || i === 0) pts.push(routePoints[i]);
    if (i < routeSegLen.length) walked += routeSegLen[i];
  }
  if (pts.length < 2) return routePoints.slice(-4);
  return pts;
}

function buildAuroraCorridor() {
  const fromT = Math.max(0, 0.64);
  const slice = getRouteSliceFromT(fromT);
  const bezier = buildBezierSegments(slice, 0.42);
  const mesh = createCorridorMesh(bezier, { radius: 0.22, tubularSegments: 96, radialSegments: 6 });
  mesh.visible = false;
  updateCorridorUniforms(mesh, 0, 0, 0x00e5ff);
  return mesh;
}

function rebuildAuroraCorridor() {
  if (!worldGroup) return;
  if (auroraCorridor) {
    worldGroup.remove(auroraCorridor);
    auroraCorridor.geometry.dispose();
    auroraCorridor.material.dispose();
  }
  auroraCorridor = buildAuroraCorridor();
  worldGroup.add(auroraCorridor);
  auroraOpacity = 0;
  arrowFade = 1;
  updateCorridorUniforms(auroraCorridor, 0, 0, 0x00e5ff);
}

function updateVisualFX(time) {
  const holoOn = routeT > 0.04 && routeT < 0.34;
  if (holoTunnelGroup) {
    holoTunnelGroup.visible = holoOn && CINE.phase === 'nav';
    if (holoOn) {
      holoTunnelGroup.userData.panels.forEach((mat, i) => {
        mat.opacity = 0.42 + 0.38 * Math.sin(time * 4.2 + i * 0.65);
        const hue = (time * 0.12 + i * 0.07) % 1;
        mat.color.setHSL(hue, 0.82, 0.52);
      });
    }
  }

  if (droneGroup?.userData.drones) {
    const droneOn = routeT > 0.18 && routeT < 0.42 && CINE.phase === 'nav';
    droneGroup.visible = droneOn;
    if (droneOn) {
      const { drones, baseX, baseZ } = droneGroup.userData;
      drones.forEach((d, i) => {
        const ph = time * 1.8 + d.userData.phase;
        d.position.set(
          baseX + d.userData.xOff + Math.sin(ph) * 2.5,
          6.5 + Math.sin(ph * 1.4) * 0.8,
          baseZ + Math.cos(ph * 0.9) * 3.5 - 8
        );
        d.rotation.y = ph * 0.5;
      });
    }
  }

  const finalT = 0.65;
  if (routeT > finalT && CINE.phase === 'nav') {
    auroraOpacity = Math.min(1, (routeT - finalT) / 0.11);
    arrowFade = Math.max(0, 1 - auroraOpacity * 1.15);
  } else if (CINE.phase !== 'nav') {
    auroraOpacity = CINE.phase === 'finale' ? 1 : 0;
  }

  if (auroraCorridor) {
    auroraCorridor.visible = auroraOpacity > 0.02;
    const col = new THREE.Color().setHSL(0.5 + Math.sin(time * 1.4) * 0.045, 0.92, 0.56);
    updateCorridorUniforms(auroraCorridor, time, 0.04 + auroraOpacity * 0.3, col);
  }

  if (routeArrowGroup) {
    routeArrowGroup.traverse((c) => {
      if (c.material?.opacity !== undefined && c.renderOrder >= 20) {
        c.material.opacity = (c.renderOrder === 20 ? 0.7 : 0.95) * arrowFade;
      }
    });
  }

  const splatStartT = 0.78;
  if (routeT > splatStartT && CINE.phase === 'nav') {
    splatReveal = Math.min(0.52, (routeT - splatStartT) / 0.12);
  }
  if (CINE.phase === 'finale') {
    splatReveal = Math.min(1, 0.52 + CINE.finaleT / 2.4);
  }
  plazaReveal = Math.max(auroraOpacity * 0.75, splatReveal);
  if (splatOverlay) {
    splatOverlay.setReveal(splatReveal);
    splatOverlay.setWorldPosition(destinationWorld.x, 0, destinationWorld.z);
  }
  updatePlazaReveal(time);
  if (routeT > 0.85 && CINE.phase === 'nav') {
    document.getElementById('hud')?.classList.add('cine-dim');
  } else if (CINE.phase !== 'finale') {
    document.getElementById('hud')?.classList.remove('cine-dim');
  }
}

function setCineClasses(active, night) {
  document.body.classList.toggle('cine-active', active);
  document.body.classList.toggle('cine-night', night);
}

function resetCineState() {
  CINE.phase = 'idle';
  CINE.introT = 0;
  CINE.finaleT = 0;
  splatReveal = 0;
  auroraOpacity = 0;
  arrowFade = 1;
  plazaReveal = 0;
  setCineClasses(false, false);
  document.getElementById('hud')?.classList.remove('cine-dim', 'cine-hide');
  document.getElementById('ctrl')?.classList.remove('cine-hide');
  document.getElementById('destBeaconHud')?.classList.remove('cine-hide');
  document.getElementById('badge')?.classList.remove('cine-hide');
  document.getElementById('cineOverlay')?.classList.remove('show');
  if (splatOverlay) splatOverlay.setReveal(0);
  if (destBeaconGroup) destBeaconGroup.visible = true;
  if (holoTunnelGroup) holoTunnelGroup.visible = false;
  if (droneGroup) droneGroup.visible = false;
  if (auroraCorridor) {
    auroraCorridor.visible = false;
    updateCorridorUniforms(auroraCorridor, 0, 0, 0x00e5ff);
  }
  updatePlazaReveal(0);
}

function updatePlazaReveal(time) {
  if (CINE.phase === 'idle' && routeT <= 0.001) plazaReveal = 0;
  const tag = document.getElementById('cineTag');
  const sub = document.getElementById('cineSub');
  if (tag && plazaReveal > 0.08 && CINE.phase !== 'finale') tag.textContent = '北广场实景重建 · 正在融合';
  if (sub && CINE.phase === 'finale') {
    const pct = Math.min(99.4, 91 + splatReveal * 8.4 + Math.sin(time * 1.1) * 0.2);
    sub.textContent = `3DGS 扫描显现 · 置信度 ${pct.toFixed(1)}%`;
  }
}

let arrowGeoCache = null;
function getArrowGeometry() {
  if (arrowGeoCache) return arrowGeoCache;
  const L = ROUTE_ARROW.length;
  const W = ROUTE_ARROW.width;
  const s = new THREE.Shape();
  s.moveTo(0, L * 0.5);
  s.lineTo(-W * 0.46, L * 0.1);
  s.lineTo(-W * 0.16, L * 0.1);
  s.lineTo(-W * 0.16, -L * 0.42);
  s.lineTo(W * 0.16, -L * 0.42);
  s.lineTo(W * 0.16, L * 0.1);
  s.lineTo(W * 0.46, L * 0.1);
  s.closePath();
  arrowGeoCache = new THREE.ShapeGeometry(s);
  arrowGeoCache.rotateX(-Math.PI / 2);
  return arrowGeoCache;
}

function createRouteArrowMesh(geo, ang, x, z) {
  const group = new THREE.Group();
  const edge = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color: 0xffffff,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.7,
    depthWrite: false,
    polygonOffset: true,
    polygonOffsetFactor: -2,
    polygonOffsetUnits: -2,
  }));
  edge.scale.set(1.1, 1.1, 1.1);
  edge.renderOrder = 20;
  const fill = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color: 0x00e5ff,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.95,
    depthWrite: false,
    polygonOffset: true,
    polygonOffsetFactor: -3,
    polygonOffsetUnits: -3,
  }));
  fill.renderOrder = 21;
  group.add(edge, fill);
  group.position.set(x, ROUTE_ARROW.liftY, z);
  group.rotation.set(0, ang, 0);
  return group;
}

function buildRouteArrows() {
  arrowGeoCache = null;
  if (routeArrowGroup) {
    while (routeArrowGroup.children.length) {
      const ch = routeArrowGroup.children[0];
      routeArrowGroup.remove(ch);
      ch.traverse((c) => {
        if (c.geometry && c.geometry !== arrowGeoCache) c.geometry.dispose();
        if (c.material) c.material.dispose();
      });
    }
  } else {
    routeArrowGroup = new THREE.Group();
  }
  routeArrowGroup.visible = DEBUG.showRouteLine;
  routeArrowGroup.renderOrder = 12;

  const geo = getArrowGeometry();
  const spacing = DEBUG.arrowSpacing;
  let walked = 0;
  let nextAt = spacing * 0.35;
  for (let i = 0; i < routeSegLen.length; i++) {
    const seg = routeSegLen[i];
    const a = routePoints[i], b = routePoints[i + 1];
    const dx = b.x - a.x, dz = b.z - a.z;
    const ang = Math.atan2(dx, dz) + Math.PI;
    while (nextAt <= walked + seg) {
      const u = seg > 0 ? (nextAt - walked) / seg : 0;
      routeArrowGroup.add(createRouteArrowMesh(
        geo, ang, a.x + dx * u, a.z + dz * u
      ));
      nextAt += spacing;
    }
    walked += seg;
  }
  return routeArrowGroup;
}

function getDestinationWorld() {
  if (!routePoints.length) return { x: 0, z: 0 };
  const last = routePoints[routePoints.length - 1];
  return { x: last.x, z: last.z };
}

function createDestinationBeacon(x, z) {
  const g = new THREE.Group();
  const mats = [];
  const addMat = (mat) => { mats.push(mat); return mat; };

  const plazaBase = new THREE.Mesh(
    new THREE.CylinderGeometry(4.8, 5.4, 0.08, 48),
    addMat(new THREE.MeshBasicMaterial({ color: 0x07111f, transparent: true, opacity: 0, depthWrite: false }))
  );
  plazaBase.position.y = 0.07;
  plazaBase.scale.z = 0.72;
  g.add(plazaBase);

  const ringMat = addMat(new THREE.MeshBasicMaterial({
    color: 0x22d3ee, side: THREE.DoubleSide, transparent: true, opacity: 0, depthWrite: false,
  }));
  const rings = [];
  for (let i = 0; i < 4; i++) {
    const ring = new THREE.Mesh(new THREE.RingGeometry(2.1 + i * 0.9, 2.18 + i * 0.9, 96), ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.13 + i * 0.015;
    ring.scale.z = 0.72;
    rings.push(ring);
    g.add(ring);
  }

  const sweepMat = addMat(new THREE.MeshBasicMaterial({
    color: 0x67e8f9, side: THREE.DoubleSide, transparent: true, opacity: 0, depthWrite: false,
  }));
  const sweeps = new THREE.Group();
  for (let i = 0; i < 5; i++) {
    const sweep = new THREE.Mesh(new THREE.PlaneGeometry(0.06, 11.5), sweepMat);
    sweep.position.y = 4.4;
    sweep.rotation.y = i * Math.PI / 5;
    sweeps.add(sweep);
  }
  g.add(sweeps);

  const fogMats = [];
  const fog = new THREE.Group();
  for (let i = 0; i < 6; i++) {
    const mat = addMat(new THREE.MeshBasicMaterial({
      color: i % 2 ? 0x88f7ff : 0xff5bd6,
      transparent: true,
      opacity: 0,
      side: THREE.DoubleSide,
      depthWrite: false,
    }));
    fogMats.push(mat);
    const veil = new THREE.Mesh(new THREE.PlaneGeometry(9.8 - i * 0.55, 2.6 + i * 0.38), mat);
    veil.position.set((i - 2.5) * 0.18, 1.8 + i * 0.58, -2.65 - i * 0.18);
    veil.rotation.y = (i - 2.5) * 0.08;
    fog.add(veil);
  }
  g.add(fog);

  const facadeMat = addMat(new THREE.MeshBasicMaterial({
    color: 0x9eefff, transparent: true, opacity: 0, wireframe: true, depthWrite: false,
  }));
  const facade = new THREE.Group();
  const back = new THREE.Mesh(new THREE.BoxGeometry(10.6, 7.8, 0.08), facadeMat);
  back.position.set(0, 4.0, -3.4);
  facade.add(back);
  for (const sx of [-1, 1]) {
    const wing = new THREE.Mesh(new THREE.BoxGeometry(0.08, 6.5, 4.2), facadeMat);
    wing.position.set(sx * 5.25, 3.35, -1.15);
    facade.add(wing);
  }
  g.add(facade);

  const coreMat = addMat(new THREE.MeshBasicMaterial({
    color: 0x00e5ff, transparent: true, opacity: 0, depthWrite: false,
  }));
  const core = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.34, 9.8, 16), coreMat);
  core.position.set(0, 4.9, -1.25);
  g.add(core);

  g.position.set(x, 0, z);
  g.userData = { mats, fogMats, sweeps, rings, facade, core, plazaBase, ringMat, sweepMat, facadeMat, coreMat };
  return g;
}

function rebuildDestinationBeacon() {
  destinationWorld = getDestinationWorld();
  if (destBeaconGroup) {
    worldGroup?.remove(destBeaconGroup);
    destBeaconGroup.traverse((c) => {
      if (c.geometry) c.geometry.dispose();
      if (c.material) c.material.dispose();
    });
  }
  destBeaconGroup = createDestinationBeacon(destinationWorld.x, destinationWorld.z);
  return destBeaconGroup;
}

function updateDestinationBeacon(time) {
  if (!destBeaconGroup?.userData) return;
  const pulse = 0.5 + 0.5 * Math.sin(time * 2.2);
  const { sweeps, rings, facade, core, plazaBase, ringMat, sweepMat, facadeMat, coreMat, fogMats } = destBeaconGroup.userData;
  const r = plazaReveal;
  destBeaconGroup.visible = r > 0.01 || CINE.phase !== 'idle';
  plazaBase.material.opacity = 0.08 + r * 0.2;
  ringMat.opacity = r * (0.18 + pulse * 0.16);
  sweepMat.opacity = r * (0.1 + pulse * 0.12);
  facadeMat.opacity = Math.max(0, r - 0.28) * 0.26;
  coreMat.opacity = Math.max(0, r - 0.12) * (0.32 + pulse * 0.22);
  sweeps.rotation.y = time * 0.42;
  facade.scale.setScalar(0.96 + r * 0.04);
  core.scale.setScalar(0.8 + r * 0.24);
  rings.forEach((ring, i) => {
    ring.rotation.z = time * (0.08 + i * 0.018);
    ring.scale.set(1 + r * 0.08 + pulse * 0.02, 1 + r * 0.08 + pulse * 0.02, 0.72);
  });
  fogMats.forEach((mat, i) => {
    const drift = 0.5 + 0.5 * Math.sin(time * 0.85 + i * 0.9);
    mat.opacity = Math.max(0, 0.22 - r * 0.16) * (0.42 + drift * 0.3);
  });
}

function updateDestBeaconHud(t) {
  const hud = document.getElementById('destBeaconHud');
  const distEl = document.getElementById('beaconDist');
  const ptr = document.getElementById('beaconPointer');
  if (!hud || !distEl || !ptr || !camera) return;

  if (t >= 0.992) {
    hud.classList.add('arrived');
    distEl.textContent = '已到达';
    ptr.style.transform = 'rotate(0deg)';
    return;
  }
  hud.classList.remove('arrived');

  const px = camera.position.x, pz = camera.position.z;
  const dx = destinationWorld.x - px, dz = destinationWorld.z - pz;
  const dist = Math.hypot(dx, dz);
  distEl.textContent = `${Math.max(0, Math.round(dist))} m`;

  camera.getWorldDirection(_camDir);
  const camYaw = Math.atan2(_camDir.x, _camDir.z);
  const bearing = Math.atan2(dx, dz);
  let rel = bearing - camYaw;
  while (rel > Math.PI) rel -= Math.PI * 2;
  while (rel < -Math.PI) rel += Math.PI * 2;
  ptr.style.transform = `rotate(${rel}rad)`;
}

function rebuildRouteVisuals() {
  buildRoute();
  rebuildDestinationBeacon();
  rebuildAuroraCorridor();
  if (worldGroup && destBeaconGroup) {
    if (!worldGroup.children.includes(destBeaconGroup)) worldGroup.add(destBeaconGroup);
  }
  buildRouteArrows();
  if (splatOverlay) {
    splatOverlay.setWorldPosition(destinationWorld.x, 0, destinationWorld.z);
  }
  if (colliderDebugGroup) {
    worldGroup.remove(colliderDebugGroup);
    worldGroup.add(buildColliderDebug());
  }
  if (routeT > 0 && routeT < 1) placeCamera(routeT);
  updateHud(routeT, 0);
  updateDebugOut();
}

function routePointAt(t) {
  if (!routePoints.length) return { x: 0, z: 0 };
  if (routePoints.length === 1 || !routeSegLen.length) return { ...routePoints[0] };
  const target = t * routeLen;
  let walked = 0;
  for (let i = 0; i < routeSegLen.length; i++) {
    const seg = routeSegLen[i];
    if (walked + seg >= target) {
      const u = seg > 0 ? (target - walked) / seg : 0;
      const a = routePoints[i], b = routePoints[i + 1];
      return {
        x: a.x + (b.x - a.x) * u,
        z: a.z + (b.z - a.z) * u,
      };
    }
    walked += seg;
  }
  const last = routePoints[routePoints.length - 1];
  return { x: last.x, z: last.z };
}

function buildCity() {
  buildingColliders = [];
  lampBulbs = [];
  shopMats = [];
  const { grid, cell, road, sidewalk, blocks } = CFG;
  const g = new THREE.Group();
  const s = span();
  const o = origin();
  const inset = sidewalk + 0.35;

  groundMat = new THREE.MeshBasicMaterial({ color: 0x6b9a52 });
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(s + 40, s + 40), groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.02;
  g.add(ground);

  asphaltMat = MAT.asphalt;
  const box = new THREE.BoxGeometry(1, 0.1, 1);

  for (let i = 0; i <= grid; i++) {
    const px = roadX(i), pz = roadZ(i);
    const hRoad = new THREE.Mesh(new THREE.BoxGeometry(s, 0.1, road), asphaltMat);
    hRoad.position.set(0, 0.05, pz);
    g.add(hRoad);
    const vRoad = new THREE.Mesh(new THREE.BoxGeometry(road, 0.1, s), asphaltMat);
    vRoad.position.set(px, 0.05, 0);
    g.add(vRoad);

    for (const sign of [-1, 1]) {
      const hSw = new THREE.Mesh(new THREE.BoxGeometry(s, 0.1, sidewalk), MAT.walk);
      hSw.position.set(0, 0.06, pz + sign * (road / 2 + sidewalk / 2));
      g.add(hSw);
      const vSw = new THREE.Mesh(new THREE.BoxGeometry(sidewalk, 0.1, s), MAT.walk);
      vSw.position.set(px + sign * (road / 2 + sidewalk / 2), 0.06, 0);
      g.add(vSw);
    }

    if (i % 2 === 0) {
      for (let t = o + 16; t < o + s - 8; t += 36) {
        const lx = px + road / 2 + sidewalk * 0.5;
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.07, 3.8, 6), MAT.pole);
        pole.position.set(lx, 1.9, t);
        g.add(pole);
        const bulb = new THREE.Mesh(box, new THREE.MeshBasicMaterial({ color: 0xfff0cc }));
        bulb.scale.set(0.35, 0.12, 0.2);
        bulb.position.set(lx, 3.85, t);
        g.add(bulb);
        lampBulbs.push(bulb);
      }
    }
  }

  let treeCount = 0;
  for (let r = 0; r < grid; r++) {
    for (let c = 0; c < grid; c++) {
      const t = blocks[r][c];
      if (!t) continue;
      const rect = blockRect(c, r);
      const bx = (rect.x0 + rect.x1) / 2, bz = (rect.z0 + rect.z1) / 2;
      const bw = rect.x1 - rect.x0 - inset * 2;
      const bd = rect.z1 - rect.z0 - inset * 2;

      buildingColliders.push({
        x0: bx - bw / 2, x1: bx + bw / 2, z0: bz - bd / 2, z1: bz + bd / 2,
      });

      addBlockBuilding(g, bx, bz, bw, bd, t);

      if (treeCount < 24 && rand() > 0.45) {
        const tx = bx + (rand() > 0.5 ? 1 : -1) * (bw / 2 + 0.8);
        const tz = bz + (rand() - 0.5) * bd * 0.5;
        if (!insideBuilding(tx, tz, 0.5)) {
          const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 1.4, 5), MAT.trunk);
          trunk.position.set(tx, 0.7, tz);
          g.add(trunk);
          const crown = new THREE.Mesh(new THREE.ConeGeometry(0.7, 2, 5), MAT.crown);
          crown.position.set(tx, 2, tz);
          g.add(crown);
          treeCount++;
        }
      }
    }
  }
  return g;
}

function buildColliderDebug() {
  colliderDebugGroup = new THREE.Group();
  colliderDebugGroup.visible = DEBUG.showColliders;
  const mat = new THREE.LineBasicMaterial({ color: 0xff6b6b, transparent: true, opacity: 0.85 });
  for (const b of buildingColliders) {
    const w = b.x1 - b.x0, d = b.z1 - b.z0;
    const geo = new THREE.BoxGeometry(w, 0.05, d);
    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), mat);
    edges.position.set((b.x0 + b.x1) / 2, 0.08, (b.z0 + b.z1) / 2);
    colliderDebugGroup.add(edges);
  }
  for (const o of streetObstacles) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(o.radius * 0.92, o.radius, 24),
      new THREE.MeshBasicMaterial({ color: 0xfbbf24, side: THREE.DoubleSide, transparent: true, opacity: 0.55 })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(o.x, 0.09, o.z);
    colliderDebugGroup.add(ring);
  }
  return colliderDebugGroup;
}

function updateDebugOut() {
  const el = document.getElementById('debugOut');
  if (!el) return;
  const p = routePointAt(routeT);
  el.textContent = [
    `routeT ${(routeT * 100).toFixed(1)}%  len ${routeLen.toFixed(1)}m`,
    `pos x:${p.x.toFixed(2)} z:${p.z.toFixed(2)}`,
    `pts ${routePoints.length}  inBuilding ${insideBuilding(p.x, p.z) ? 'YES' : 'no'}`,
    `fps ${fpsVal.toFixed(0)}  anim ${animating}`,
    `obstacles ${streetObstacles.length}  route pts ${routePoints.length}`,
  ].join('\n');
}

function hudSegment(t) {
  let seg = routeMeta[0];
  for (const m of routeMeta) { if (m.t <= t) seg = m; else break; }
  const next = routeMeta.find(m => m.t > t && m.turn);
  return { seg, next, turnDist: next ? (next.t - t) * routeLen : Infinity };
}

function setTurnPanel(show) {
  turnPanel.classList.toggle('hidden-panel', !show);
}

function updateHud(t, speed) {
  const remain = (1 - t) * routeLen;
  document.getElementById('cityName').textContent = CFG.name;
  document.getElementById('destName').textContent = CFG.destination;
  document.getElementById('distLeft').textContent = `剩余 ${remain.toFixed(0)} m`;
  document.getElementById('eta').textContent = `预计 ${Math.max(1, Math.ceil(remain / DEBUG.walkSpeed / 60))} 分钟`;
  document.getElementById('speed').textContent = `${(speed * 3.6).toFixed(1)} km/h`;
  routeBar.style.width = `${(t * 100).toFixed(1)}%`;
  updateDestBeaconHud(t);
  if (t > 0.992) {
    document.getElementById('streetName').textContent = CFG.destination;
    arrowEl.classList.add('hidden');
    turnHint.textContent = '已到达目的地';
    setTurnPanel(false);
    setBadge('已到达', true);
    return;
  }
  const { seg, next, turnDist } = hudSegment(t);
  document.getElementById('streetName').textContent = seg.street || '—';
  if (next && turnDist < DEBUG.turnDist) {
    setTurnPanel(true);
    arrowEl.classList.remove('hidden');
    arrowEl.textContent = turnGlyph[next.turn] || '↑';
    turnHint.textContent = next.hint || '';
  } else {
    setTurnPanel(false);
    arrowEl.classList.add('hidden');
    turnHint.textContent = '';
  }
}

function placeCamera(t) {
  if (CINE.phase === 'intro') {
    const u = easeInOutCubic(Math.min(1, CINE.introT / CINE.introDur));
    const start = routePointAt(0);
    const ahead0 = routePointAt(Math.min(0.02, 0.02));
    const cx = (start.x + ahead0.x) * 0.5;
    const cz = start.z;
    const fromY = 92, fromZ = cz + 75;
    const px = cx + (start.x - cx) * u;
    const py = fromY + (DEBUG.eyeH - fromY) * u;
    const pz = fromZ + (start.z - fromZ) * u;
    const lx = cx + (ahead0.x - cx) * u;
    const lz = cz + (ahead0.z - cz) * u;
    camera.position.set(px, py, pz);
    _lookAt.set(lx, DEBUG.eyeH * 0.6, lz);
    camera.lookAt(_lookAt);
    camera.fov = DEBUG.fov + (1 - u) * 18;
    camera.updateProjectionMatrix();
    return;
  }

  if (CINE.phase === 'finale') {
    const u = easeInOutCubic(Math.min(1, CINE.finaleT / 3.5));
    const dest = destinationWorld;
    const ang = -0.2 + u * 0.55;
    const dist = 14 - u * 7;
    camera.position.set(
      dest.x + Math.sin(ang) * dist,
      DEBUG.eyeH + 1.8 + u * 3.5,
      dest.z + Math.cos(ang) * dist
    );
    _lookAt.set(dest.x, 3.5 + u * 4, dest.z);
    camera.lookAt(_lookAt);
    camera.fov = DEBUG.fov + u * 8;
    camera.updateProjectionMatrix();
    return;
  }

  camera.fov = DEBUG.fov;
  camera.updateProjectionMatrix();
  const pos = routePointAt(t);
  const ahead = routePointAt(Math.min(1, t + 0.008));
  const bob = animating ? Math.sin(clock.getElapsedTime() * 8) * DEBUG.headBob : 0;
  camera.position.set(pos.x, DEBUG.eyeH + bob, pos.z);
  camera.lookAt(ahead.x, DEBUG.eyeH + bob - 0.04, ahead.z);
}

function updateCinematic(dt) {
  if (CINE.phase === 'intro') {
    CINE.introT += dt;
    if (CINE.introT > CINE.introDur * 0.38 && isDay) {
      applyTimeOfDay(false);
      setCineClasses(true, true);
      scene.fog = new THREE.FogExp2(0x0a0c18, 0.011);
    }
    if (CINE.introT >= CINE.introDur) {
      CINE.phase = 'nav';
      animating = true;
      routeT = 0;
      setBadge('导航中', true);
      camera.fov = DEBUG.fov;
      camera.updateProjectionMatrix();
    }
    return;
  }

  if (CINE.phase === 'nav' && routeT >= 1 && !DEBUG.scrubbing) {
    CINE.phase = 'finale';
    CINE.finaleT = 0;
    animating = false;
    document.getElementById('hud')?.classList.add('cine-hide');
    document.getElementById('ctrl')?.classList.add('cine-hide');
    document.getElementById('destBeaconHud')?.classList.add('cine-hide');
    document.getElementById('badge')?.classList.add('cine-hide');
    document.getElementById('cineTitle').textContent = CFG.destination;
    document.getElementById('cineSub').textContent = '3D Gaussian Splatting · 实景重建完成';
    setTimeout(() => document.getElementById('cineOverlay')?.classList.add('show'), 600);
    setBadge('已到达', true);
  }

  if (CINE.phase === 'finale') {
    CINE.finaleT += dt;
  }
}

function applyTimeOfDay(day) {
  if (!scene || !renderer) return;
  isDay = day;
  document.body.classList.toggle('day', day);
  const sel = document.getElementById('setTime');
  if (sel) sel.value = day ? 'day' : 'night';

  scene.background = new THREE.Color(day ? 0x87c8f5 : 0x06080f);
  if (!day && CINE.phase !== 'idle') {
    scene.fog = new THREE.FogExp2(0x0a0c18, 0.011);
  } else if (day) {
    scene.fog = null;
  }
  if (scene.fog?.color) scene.fog.color.setHex(day ? 0xc8e4f8 : 0x0a0c14);
  if (scene.fog?.density !== undefined && !day) scene.fog.density = 0.011;

  if (hemi) {
    hemi.intensity = day ? 0.9 : 0.25;
    hemi.color.setHex(day ? 0xb8dcff : 0x334455);
    hemi.groundColor.setHex(day ? 0x6b8a50 : 0x080808);
  }
  if (ambient) ambient.intensity = day ? 0.45 : 0.15;
  if (sun) {
    sun.intensity = day ? 1.1 : 0.15;
    sun.color.setHex(day ? 0xfff5e8 : 0x8899bb);
  }
  renderer.toneMappingExposure = DEBUG.exposure;

  if (groundMat?.color) groundMat.color.setHex(day ? 0x6b9a52 : 0x1a1c18);
  if (asphaltMat?.color) asphaltMat.color.setHex(day ? 0xffffff : 0x888888);

  const lampCol = day ? 0xfff0cc : 0xffcc66;
  for (let i = 0; i < lampBulbs.length; i++) {
    if (lampBulbs[i].material?.color) lampBulbs[i].material.color.setHex(lampCol);
  }
  for (let i = 0; i < shopMats.length; i++) {
    if (!shopMats[i].userData.dayColor) shopMats[i].userData.dayColor = shopMats[i].color.getHex();
    shopMats[i].color.setHex(day ? shopMats[i].userData.dayColor : 0xffdd88);
  }
}

function resetNav() {
  animating = false;
  routeT = 0;
  resetCineState();
  applyTimeOfDay(true);
  if (scene) scene.fog = null;
  placeCamera(0);
  updateHud(0, 0);
  setBadge('待机', false);
  document.getElementById('streetName').textContent = '准备就绪 — 点击开始导航';
  turnHint.textContent = '';
  arrowEl.classList.add('hidden');
  setTurnPanel(false);
}

function applyHudSide(side) {
  hudSide = side === 'right' ? 'right' : 'left';
  document.body.classList.toggle('hud-left', hudSide === 'left');
  document.body.classList.toggle('hud-right', hudSide === 'right');
  const sel = document.getElementById('setHudSide');
  if (sel) sel.value = hudSide;
  try { localStorage.setItem('navHudSide', hudSide); } catch (_) {}
}

function setSettingsOpen(open) {
  const panel = document.getElementById('settings');
  const btn = document.getElementById('btnSettingsToggle');
  panel.classList.toggle('open', open);
  panel.setAttribute('aria-hidden', open ? 'false' : 'true');
  btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  try { localStorage.setItem('navSettingsOpen', open ? '1' : '0'); } catch (_) {}
}

function bindRange(id, valId, key, fmt = (v) => v) {
  const input = document.getElementById(id);
  const valEl = document.getElementById(valId);
  if (!input) return;
  const apply = () => {
    DEBUG[key] = parseFloat(input.value);
    if (valEl) valEl.textContent = fmt(DEBUG[key]);
    if (key === 'fov' && camera) { camera.fov = DEBUG.fov; camera.updateProjectionMatrix(); }
    if (key === 'exposure' && renderer) renderer.toneMappingExposure = DEBUG.exposure;
    if ((key === 'fogNear' || key === 'fogFar') && scene?.fog) {
      if (scene.fog.density !== undefined) scene.fog.density = DEBUG.fogFar / 18000;
      else { scene.fog.near = DEBUG.fogNear; scene.fog.far = DEBUG.fogFar; }
    }
    updateDebugOut();
  };
  input.addEventListener('input', apply);
  apply();
}

function initSettingsPanel() {
  document.getElementById('btnSettingsToggle').onclick = () => {
    setSettingsOpen(!document.getElementById('settings').classList.contains('open'));
  };
  document.getElementById('btnSettingsClose').onclick = () => setSettingsOpen(false);

  document.getElementById('setHudSide').onchange = (e) => applyHudSide(e.target.value);
  document.getElementById('setTime').onchange = (e) => applyTimeOfDay(e.target.value === 'day');

  document.getElementById('setRouteLine').onchange = (e) => {
    DEBUG.showRouteLine = e.target.checked;
    if (routeArrowGroup) routeArrowGroup.visible = DEBUG.showRouteLine;
  };
  document.getElementById('setArrowSpace')?.addEventListener('input', (e) => {
    DEBUG.arrowSpacing = parseFloat(e.target.value);
    document.getElementById('valArrowSpace').textContent = DEBUG.arrowSpacing.toFixed(2);
    rebuildRouteVisuals();
  });
  document.getElementById('setColliders').onchange = (e) => {
    DEBUG.showColliders = e.target.checked;
    if (colliderDebugGroup) colliderDebugGroup.visible = DEBUG.showColliders;
  };
  document.getElementById('setFps').onchange = (e) => {
    DEBUG.showFps = e.target.checked;
    document.getElementById('fps').style.display = DEBUG.showFps ? 'block' : 'none';
  };

  bindRange('setSpeed', 'valSpeed', 'walkSpeed', (v) => v.toFixed(1));
  bindRange('setEyeH', 'valEyeH', 'eyeH', (v) => v.toFixed(2));
  bindRange('setFov', 'valFov', 'fov', (v) => String(Math.round(v)));
  bindRange('setBob', 'valBob', 'headBob', (v) => v.toFixed(3));
  bindRange('setTurnDist', 'valTurnDist', 'turnDist', (v) => String(Math.round(v)));
  bindRange('setExposure', 'valExposure', 'exposure', (v) => v.toFixed(2));
  bindRange('setFogNear', 'valFogNear', 'fogNear', (v) => String(Math.round(v)));
  bindRange('setFogFar', 'valFogFar', 'fogFar', (v) => String(Math.round(v)));

  const routeSlider = document.getElementById('setRouteT');
  const routeVal = document.getElementById('valRouteT');
  routeSlider.onpointerdown = () => { DEBUG.scrubbing = true; animating = false; };
  routeSlider.oninput = () => {
    routeT = parseInt(routeSlider.value, 10) / 1000;
    routeVal.textContent = `${(routeT * 100).toFixed(1)}%`;
    placeCamera(routeT);
    updateHud(routeT, 0);
    updateDebugOut();
  };
  routeSlider.onpointerup = () => { DEBUG.scrubbing = false; };

  document.getElementById('setJumpStart').onclick = () => {
    routeT = 0; routeSlider.value = 0; routeVal.textContent = '0%';
    resetNav();
  };
  document.getElementById('setJumpEnd').onclick = () => {
    routeT = 1; routeSlider.value = 1000; routeVal.textContent = '100%';
    animating = false;
    applyTimeOfDay(false);
    setCineClasses(true, true);
    CINE.phase = 'finale';
    CINE.finaleT = 0;
    splatReveal = 0.5;
    plazaReveal = 0.75;
    placeCamera(1);
    updateVisualFX(clock?.getElapsedTime() ?? 0);
    updateHud(1, 0);
    setBadge('已到达', true);
  };

  try {
    if (localStorage.getItem('navSettingsOpen') === '1') setSettingsOpen(true);
  } catch (_) {}
}

function syncRouteSlider() {
  const routeSlider = document.getElementById('setRouteT');
  const routeVal = document.getElementById('valRouteT');
  if (!routeSlider || DEBUG.scrubbing) return;
  routeSlider.value = String(Math.round(routeT * 1000));
  if (routeVal) routeVal.textContent = `${(routeT * 100).toFixed(1)}%`;
}

function bindControls() {
  document.getElementById('btnStart').onclick = () => {
    if (routeT >= 1) resetNav();
    resetCineState();
    CINE.phase = 'intro';
    CINE.introT = 0;
    routeT = 0;
    animating = false;
    setBadge('开场', true);
    document.getElementById('streetName').textContent = '俯冲进入新港微城…';
    setCineClasses(true, false);
  };
  document.getElementById('btnPause').onclick = () => {
    animating = false;
    setBadge(routeT >= 1 ? '已到达' : '已暂停', routeT < 1);
  };
  document.getElementById('btnReset').onclick = resetNav;
}

function init() {
  try {
  if (!hasWebGL()) return showErr('需要 WebGL 支持');

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
  renderer.debug.checkShaderErrors = true;
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.setSize(innerWidth, innerHeight);
  renderer.toneMapping = THREE.NoToneMapping;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87c8f5);
  scene.fog = null;
  camera = new THREE.PerspectiveCamera(DEBUG.fov, innerWidth / innerHeight, 0.1, 220);

  hemi = new THREE.HemisphereLight(0xb8dcff, 0x6b8a50, 0.9);
  ambient = new THREE.AmbientLight(0xffffff, 0.45);
  sun = new THREE.DirectionalLight(0xfff5e8, 1.35);
  sun.position.set(50, 80, 30);
  sun.target.position.set(0, 0, 0);

  worldGroup = new THREE.Group();
  cityGroup = buildCity();
  worldGroup.add(cityGroup);
  worldGroup.add(buildUrbanFeatures());
  worldGroup.add(buildStreetObstacles());
  holoTunnelGroup = buildHoloTunnel();
  droneGroup = buildDroneSquad();
  worldGroup.add(holoTunnelGroup, droneGroup);
  buildRoute();
  worldGroup.add(rebuildDestinationBeacon());
  auroraCorridor = buildAuroraCorridor();
  worldGroup.add(auroraCorridor);
  worldGroup.add(buildRouteArrows());
  worldGroup.add(buildColliderDebug());
  scene.add(hemi, ambient, sun, sun.target);
  scene.add(worldGroup);

  const gl = renderer.getContext();
  if (gl instanceof WebGL2RenderingContext) {
    try {
      splatOverlay = new SplatOverlay(gl);
      splatOverlay.resize(innerWidth, innerHeight, DEBUG.fov);
      splatOverlay.setWorldPosition(destinationWorld.x, 0, destinationWorld.z);
    } catch (e) {
      console.warn('SplatOverlay 不可用', e);
    }
  }

  function renderFrame() {
    const sky = scene.background instanceof THREE.Color ? scene.background : new THREE.Color(0x87c8f5);
    renderer.setRenderTarget(null);
    renderer.setClearColor(sky, 1);
    if (routeArrowGroup) routeArrowGroup.visible = DEBUG.showRouteLine && arrowFade > 0.05;
    renderer.render(scene, camera);
    if (splatOverlay) splatOverlay.renderFromCamera(camera);
  }

  clock = new THREE.Clock();
  applyTimeOfDay(true);
  resetNav();
  initSettingsPanel();
  updateDebugOut();

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    if (splatOverlay) splatOverlay.resize(innerWidth, innerHeight, camera.fov);
  });

  let lastSpeed = 0;
  (function tick() {
    requestAnimationFrame(tick);
    const dt = Math.min(clock.getDelta(), 0.05);
    const time = clock.getElapsedTime();
    updateCinematic(dt);
    if (animating && !DEBUG.scrubbing && routeT < 1 && CINE.phase === 'nav') {
      routeT += (DEBUG.walkSpeed * dt) / routeLen;
      if (routeT >= 1) { routeT = 1; animating = false; }
      lastSpeed = DEBUG.walkSpeed;
    } else lastSpeed *= 0.88;
    placeCamera(routeT);
    updateVisualFX(time);
    updateHud(routeT, lastSpeed);
    syncRouteSlider();
    updateDebugOut();
    updateTrafficLights(time);
    updateDestinationBeacon(time);

    renderFrame();

    fpsAcc += dt; fpsFrames++;
    if (fpsAcc >= 0.5) {
      fpsVal = fpsFrames / fpsAcc;
      fpsAcc = 0; fpsFrames = 0;
      if (DEBUG.showFps) document.getElementById('fps').textContent = `${fpsVal.toFixed(0)} fps`;
    }
  })();
  } catch (e) {
    console.error(e);
    showErr('初始化失败：' + e.message);
  }
}

bindControls();
try {
  const saved = localStorage.getItem('navHudSide');
  if (saved === 'left' || saved === 'right') applyHudSide(saved);
  else applyHudSide('left');
} catch (_) { applyHudSide('left'); }
init();
</script>
